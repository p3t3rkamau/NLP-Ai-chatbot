<!DOCTYPE html>
<html>
  <head>
    <title>Chat Log</title>
    <style>
      .user {
        color: blue;
        font-weight: bold;
      }
      .chatbot {
        color: green;
        font-weight: bold;
      }
      .error {
        color: red;
        font-weight: bold;
      }
      .flashes{
        color: red;
        text-decoration: none;
        font-size: 18px;
        list-style: none;
      }
      button {
        background-color: #da8250;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 12px 20px;
        margin-left: 8px;
        cursor: pointer;
    }
  
    </style>
    <meta http-equiv="refresh" content="10">
  </head>
  <body>
    <body>
        <h1>Chat Log</h1>
        <form action="{{ url_for('admin.clear_chatlog_route') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit">Clear Chat Log</button>
          </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flashes">
              {% for message in messages %}
                <li>{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        <pre>
          {% for line, css_class in lines %}
            <span class="{{ css_class }}">{{ line }}</span>
            <span>{{ feed }}</span>
          {% endfor %}
        </pre>
        
      </body>
      
  </body>
</html>
